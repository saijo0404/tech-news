site_name: 科技新聞摘要彙整
site_description: Google 與 NVIDIA 近期文章與部落格中文摘要
theme:
  name: material
  language: zh-Hant
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切換至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切換至淺色模式
nav:
  - 首頁: index.md
  - Google 新聞: google/
  - NVIDIA 新聞: nvidia/
